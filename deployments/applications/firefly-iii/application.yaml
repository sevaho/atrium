---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: firefly-iii
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sevaho/atrium
    path: deployments/applications/firefly-iii
    targetRevision: HEAD
    helm:
      releaseName: firefly-iii
      valuesObject:
        firefly-iii:
          replicaCount: 1
          config:
            existingSecret: "firefly-data-secret"
            env:
              DB_CONNECTION: pgsql
              DB_PORT: "5432"
              DB_DATABASE: firefly
              DEFAULT_LANGUAGE: "en_US"
              DEFAULT_LOCALE: "equal"
              TZ: "Europe/Brussels"
              TRUSTED_PROXIES: "**"


  destination:
    server: "https://kubernetes.default.svc"
    namespace: applications
  syncPolicy: {}

  info:
  - name: releasenotes
    value: https://github.com/firefly-iii/firefly-iii/releases
  - name: values.yaml
    value: https://github.com/firefly-iii/kubernetes/blob/main/charts/firefly-iii/values.yaml
