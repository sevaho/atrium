---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sevaho/atrium
    path: deployments/observability/prometheus
    targetRevision: HEAD
    helm:
      releaseName: prometheus
      valuesObject:
        prometheus:

          alertmanager:
            # values.yaml: https://github.com/prometheus-community/helm-charts/blob/main/charts/alertmanager/values.yaml
            enabled: True

            config:
              enabled: true
              global: {}
                # slack_api_url: ''

              templates:
                - '/etc/alertmanager/*.tmpl'

              # receivers:
              #   - name: default-receiver
                  # slack_configs:
                  #  - channel: '@you'
                  #    send_resolved: true
          server:
            # Prometheus data retention period (default if not specified is 15 days)
            retention: "30d"
            # Prometheus' data retention size. Supported units: B, KB, MB, GB, TB, PB, EB.
            retentionSize: "60GB"
            tcpSocketProbeEnabled: true
            persistentVolume:
              size: 50Gi
          serverFiles:
            ## Ref: https://prometheus.io/docs/prometheus/latest/configuration/alerting_rules/
            alerting_rules.yml:
              groups:
                - name: Host and hardware
                  # See: https://samber.github.io/awesome-prometheus-alerts/rules#host-and-hardware
                  labels:
                    team: devops
                  rules:
                  - alert: HostOutOfMemory
                    expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes < .10)
                    for: 0m
                    labels:
                      severity: warning
                    annotations:
                      summary: Host out of memory.
                      description: Node memory is filling up.


          scrapeConfigs:

            # ==========================================================================
            longhorn:
            # ==========================================================================
              static_configs:
                - targets:
                  - longhorn-backend.longhorn-system.svc.cluster.local:9500


            # ==========================================================================
            argocd:
            # ==========================================================================
              static_configs:
                - targets:
                  - argocd-application-controller-metrics.argocd.svc.cluster.local:8082

            # ==========================================================================
            quickwit:
            # ==========================================================================
              static_configs:
                - targets:
                  - quickwit-control-plane.observability.svc.cluster.local:7280

            # ==========================================================================
            ingress-nginx:
            # This was enabled for rke2 by using a helmChartConfig
            # More info:
            # - https://docs.rke2.io/networking/networking_services#ingress-controller
            # - https://github.com/kubernetes/ingress-nginx/blob/main/charts/ingress-nginx/templates/controller-service-metrics.yaml
            # - https://docs.nginx.com/nginx-ingress-controller/logging-and-monitoring/prometheus/
            # ==========================================================================
              static_configs:
                - targets:
                  - rke2-ingress-nginx-controller-metrics.kube-system.svc.cluster.local:10254

            # ==========================================================================
            kubernetes-api-servers:
            # ==========================================================================
              enabled: true
              kubernetes_sd_configs:
                - role: endpoints
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token

              relabel_configs:
                - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
                  action: keep
                  regex: default;kubernetes;https

            # ==========================================================================
            kubernetes-nodes:
            # ==========================================================================
              enabled: true
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token

              kubernetes_sd_configs:
                - role: node

              relabel_configs:
                - action: labelmap
                  regex: __meta_kubernetes_node_label_(.+)
                - target_label: __address__
                  replacement: kubernetes.default.svc:443
                - source_labels: [__meta_kubernetes_node_name]
                  regex: (.+)
                  target_label: __metrics_path__
                  replacement: /api/v1/nodes/$1/proxy/metrics

            # ==========================================================================
            kubernetes-nodes-cadvisor:
            # ==========================================================================
              enabled: true
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token

              kubernetes_sd_configs:
                - role: node

              relabel_configs:
                - action: labelmap
                  regex: __meta_kubernetes_node_label_(.+)
                - target_label: __address__
                  replacement: kubernetes.default.svc:443
                - source_labels: [__meta_kubernetes_node_name]
                  regex: (.+)
                  target_label: __metrics_path__
                  replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor

            # ==========================================================================
            kubernetes-service-endpoints:
            # ==========================================================================
              enabled: true
              honor_labels: true

              kubernetes_sd_configs:
                - role: endpoints

              relabel_configs:
                - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
                  action: keep
                  regex: true
                - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape_slow]
                  action: drop
                  regex: true
                - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scheme]
                  action: replace
                  target_label: __scheme__
                  regex: (https?)
                - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
                  action: replace
                  target_label: __metrics_path__
                  regex: (.+)
                - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
                  action: replace
                  target_label: __address__
                  regex: (.+?)(?::\d+)?;(\d+)
                  replacement: $1:$2
                - action: labelmap
                  regex: __meta_kubernetes_service_annotation_prometheus_io_param_(.+)
                  replacement: __param_$1
                - action: labelmap
                  regex: __meta_kubernetes_service_label_(.+)
                - source_labels: [__meta_kubernetes_namespace]
                  action: replace
                  target_label: namespace
                - source_labels: [__meta_kubernetes_service_name]
                  action: replace
                  target_label: service
                - source_labels: [__meta_kubernetes_pod_node_name]
                  action: replace
                  target_label: node

            # ==========================================================================
            kubernetes-service-endpoints-slow:
            # ==========================================================================
              enabled: false

            # ==========================================================================
            prometheus-pushgateway:
            # ==========================================================================
              enabled: false

            # ==========================================================================
            kubernetes-services:
            # ==========================================================================
              enabled: true
              job_name: ""
              honor_labels: true
              metrics_path: /probe
              params:
                module: [http_2xx]
              kubernetes_sd_configs:
                - role: service
              relabel_configs:
                - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_probe]
                  action: keep
                  regex: true
                - source_labels: [__address__]
                  target_label: __param_target
                - target_label: __address__
                  replacement: blackbox
                - source_labels: [__param_target]
                  target_label: instance
                - action: labelmap
                  regex: __meta_kubernetes_service_label_(.+)
                - source_labels: [__meta_kubernetes_namespace]
                  target_label: namespace
                - source_labels: [__meta_kubernetes_service_name]
                  target_label: service

            # ==========================================================================
            kubernetes-pods:
            # ==========================================================================
              enabled: true
              honor_labels: true

              kubernetes_sd_configs:
                - role: pod

              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                  action: keep
                  regex: true
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape_slow]
                  action: drop
                  regex: true
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scheme]
                  action: replace
                  regex: (https?)
                  target_label: __scheme__
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                  action: replace
                  target_label: __metrics_path__
                  regex: (.+)
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port, __meta_kubernetes_pod_ip]
                  action: replace
                  regex: (\d+);(([A-Fa-f0-9]{1,4}::?){1,7}[A-Fa-f0-9]{1,4})
                  replacement: '[\$2]:$1'
                  target_label: __address__
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port, __meta_kubernetes_pod_ip]
                  action: replace
                  regex: (\d+);((([0-9]+?)(\.|\$)){4})
                  replacement: $2:$1
                  target_label: __address__
                - action: labelmap
                  regex: __meta_kubernetes_pod_annotation_prometheus_io_param_(.+)
                  replacement: __param_$1
                - action: labelmap
                  regex: __meta_kubernetes_pod_label_(.+)
                - source_labels: [__meta_kubernetes_namespace]
                  action: replace
                  target_label: namespace
                - source_labels: [__meta_kubernetes_pod_name]
                  action: replace
                  target_label: pod
                - source_labels: [__meta_kubernetes_pod_phase]
                  regex: Pending|Succeeded|Failed|Completed
                  action: drop
                - source_labels: [__meta_kubernetes_pod_node_name]
                  action: replace
                  target_label: node

            # ==========================================================================
            kubernetes-pods-slow:
            # ==========================================================================
              enabled: false




  destination:
    server: "https://kubernetes.default.svc"
    namespace: observability
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
  info:
  - name: releasenotes
    value: https://github.com/prometheus/prometheus/releases
  - name: values.yaml
    value: https://github.com/prometheus-community/helm-charts/blob/main/charts/prometheus/values.yaml
